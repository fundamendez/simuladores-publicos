<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Búsquedas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="../assets/img/favicon.png">
</head>
<body>
    <a href="../index.html" class="btn-volver-sim">⬅ Volver al Menú</a>
    
    <div class="container">
        <h1>Simulador de Búsquedas</h1>
        
        <div class="controls-panel">
            <div class="control-group">
                <label>Generar Vector:</label>
                <button onclick="generarVector(10)">10</button>
                <button onclick="generarVector(15)">15</button>
                <button onclick="generarVector(20)">20</button>
                <button class="btn-accion" onclick="ordenarVector()">Ordenar Vector</button>
            </div>

            <div class="control-group search-group">
                <label for="search-target">Buscar número:</label>
                <input type="number" id="search-target" min="0" max="50" value="25">
                <button class="btn-alg" onclick="prepararBusqueda('lineal')">Lineal (Ordinaria)</button>
                <button class="btn-alg" id="btn-binaria" onclick="prepararBusqueda('binaria')" disabled>Binaria</button>
            </div>
        </div>

        <div id="playback-controls" class="playback-controls" style="display: none;">
            <button class="btn-play" id="btn-auto" onclick="toggleAutoPlay()">▶ Auto Ejecutar</button>
            <button class="btn-step" id="btn-prev" onclick="pasoPrevio()">⏮ Paso Previo</button>
            <button class="btn-step" id="btn-next" onclick="pasoSiguiente()">Siguiente Paso ⏭</button>
            <button class="btn-cancel" onclick="cancelarEjecucion()">⏹ Cancelar</button>
        </div>

        <div id="status-message" class="status-message">Genera un vector para comenzar.</div>

        <div id="bars-container" class="bars-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
