<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emulador de Ordenamientos</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="../assets/img/favicon.png">
</head>
<body>
    <a href="../index.html" class="btn-volver-sim">⬅ Volver al Menú</a>
    
    <div class="container">
        <h1>Emulador de Ordenamientos</h1>
        
        <div class="controls-panel">
            <div class="control-group">
                <label>Generar aleatorio:</label>
                <button onclick="generarVector(5)">5</button>
                <button onclick="generarVector(10)">10</button>
                <button onclick="generarVector(15)">15</button>
                <button onclick="generarVector(20)">20</button>
            </div>
            
            <div class="control-group">
                <label for="custom-size">Personalizado (5-20):</label>
                <input type="number" id="custom-size" min="5" max="20" value="10">
                <button onclick="generarVectorPersonalizado()">Generar</button>
            </div>

            <div class="control-group algorithms">
                <label>Preparar Algoritmo:</label>
                <button class="btn-alg" onclick="prepararAlgoritmo('burbujeo')">Burbujeo</button>
                <button class="btn-alg" onclick="prepararAlgoritmo('seleccion')">Selección</button>
                <button class="btn-alg" onclick="prepararAlgoritmo('insercion')">Inserción</button>
            </div>
        </div>

        <div id="playback-controls" class="playback-controls" style="display: none;">
            <button class="btn-play" id="btn-auto" onclick="toggleAutoPlay()">▶ Auto Ejecutar</button>
            <button class="btn-step" id="btn-prev" onclick="pasoPrevio()">⏮ Paso Previo</button>
            <button class="btn-step" id="btn-next" onclick="pasoSiguiente()">Siguiente Paso ⏭</button>
            <button class="btn-cancel" onclick="cancelarEjecucion()">⏹ Cancelar</button>
        </div>

        <div id="status-message" class="status-message">Genera un vector para comenzar.</div>

        <div id="bars-container" class="bars-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
